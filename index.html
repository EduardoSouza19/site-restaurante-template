<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurante Sabor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<!-- HERO -->

<section class="bg-[url('https://images.unsplash.com/photo-1504674900247-0877df9cc836')] 
bg-cover bg-center h-screen flex items-center justify-center">

<div class="bg-black/60 p-10 rounded-xl text-center text-white">

<h1 class="text-5xl font-bold mb-4">
Restaurante Sabor
</h1>

<p class="mb-6">
Experiência gastronômica incrível
</p>

<a class="bg-red-500 px-8 py-3 rounded-lg
hover:bg-red-400 hover:scale-105 transition transform">

Reservar mesa

</a>

</div>

</section>

<!-- MENU -->

<section class="py-20">

<div class="max-w-6xl mx-auto text-center">

<h2 class="text-3xl font-bold mb-12">
Pratos populares
</h2>

<div class="grid md:grid-cols-3 gap-10">

<div class="bg-white rounded-xl shadow-lg overflow-hidden
hover:scale-105 hover:shadow-2xl transition transform">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<div class="p-6">
<h3 class="font-bold text-xl">Hambúrguer</h3>
<p class="text-gray-600">R$25</p>
</div>

</div>

<div class="bg-white rounded-xl shadow-lg overflow-hidden
hover:scale-105 hover:shadow-2xl transition transform">

<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">

<div class="p-6">
<h3 class="font-bold text-xl">Salada</h3>
<p class="text-gray-600">R$20</p>
</div>

</div>

</div>

</div>
</section>
<footer class="bottom font-bold text-center">© 2026 Restaurante Sabor</footer>
</body>
</html>
